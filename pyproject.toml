[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--tb=short -v"

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "pipeline/*", "app/seeder.py", "app/pos_loader.py"]
concurrency = ["thread", "greenlet"]

[tool.coverage.report]
show_missing = true
fail_under = 70
